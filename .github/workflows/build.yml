name: Build LomoKino GUI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements_gui.txt
          pip install pyinstaller

      - name: Build macOS app
        run: |
          pyinstaller lomokino_gui.spec

      - name: Sign macOS app (ad-hoc)
        run: |
          codesign --force --deep --sign - dist/LomoKinoGUI.app

      - name: Zip macOS app
        run: |
          cd dist
          zip -r LomoKinoGUI-macOS.zip LomoKinoGUI.app

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: LomoKinoGUI-macOS
          path: dist/LomoKinoGUI-macOS.zip

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements_gui.txt
          pip install pyinstaller

      - name: Build Windows exe
        run: |
          pyinstaller --onefile --windowed --name LomoKinoGUI lomokino_gui.py

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: LomoKinoGUI-Windows
          path: dist/LomoKinoGUI.exe

  release:
    name: Create Release
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: LomoKinoGUI-macOS

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: LomoKinoGUI-Windows

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            LomoKinoGUI-macOS.zip
            LomoKinoGUI.exe
          generate_release_notes: true
